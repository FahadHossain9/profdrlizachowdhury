<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1A4D"/>
      <stop offset="0.55" stop-color="#192B72"/>
      <stop offset="1" stop-color="#354DAE"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0" cy="0" r="1" gradientTransform="translate(950 120) rotate(45) scale(360)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8E9CCF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8E9CCF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0" cy="0" r="1" gradientTransform="translate(150 530) rotate(45) scale(320)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B8956A" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#B8956A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Subtle hairline grid frame -->
  <rect x="48" y="48" width="1104" height="534" rx="20" fill="none" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Logo monogram, top-left -->
  <g transform="translate(96 96)">
    <rect width="56" height="56" rx="12" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect width="56" height="56" rx="12" fill="none" stroke="#FFFFFF" stroke-opacity="0.25"/>
    <path d="M17 13h6v22h13v6h-19z" fill="#FFFFFF"/>
    <circle cx="40" cy="16" r="3" fill="#B8956A"/>
  </g>

  <!-- Eyebrow gold accent + label -->
  <g transform="translate(96 268)">
    <rect width="40" height="2" rx="1" fill="#B8956A"/>
    <text x="56" y="6" fill="#B8956A" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="4">
      INFERTILITY &amp; REPRODUCTIVE MEDICINE
    </text>
  </g>

  <!-- Headline -->
  <text x="96" y="370" fill="#FFFFFF" font-family="'DM Serif Display', Georgia, serif" font-size="84" font-weight="400" letter-spacing="-1.5">
    Dr. Liza Chowdhury
  </text>

  <!-- Sub-headline -->
  <text x="96" y="430" fill="#FFFFFF" fill-opacity="0.78" font-family="'DM Serif Display', Georgia, serif" font-style="italic" font-size="42" font-weight="400">
    Major Gen. Prof. (Retd.)
  </text>

  <!-- Credentials -->
  <g transform="translate(96 480)">
    <text x="0" y="0" fill="#FFFFFF" fill-opacity="0.65" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500">
      MBBS · DGO · MCPS · FCPS (OBGYN) · ESHRE · BCPS · OGSB
    </text>
  </g>

  <!-- Bottom tagline -->
  <g transform="translate(96 540)">
    <rect width="6" height="22" rx="3" fill="#B8956A"/>
    <text x="22" y="18" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600">
      Founder of Bangladesh's first government fertility centre
    </text>
  </g>

  <!-- Right-side credential pills -->
  <g transform="translate(1104 96)" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600">
    <g>
      <rect x="-100" y="0" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
      <text x="-50" y="21" fill="#FFFFFF" text-anchor="middle">AFMC</text>
    </g>
    <g transform="translate(0 44)">
      <rect x="-100" y="0" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
      <text x="-50" y="21" fill="#FFFFFF" text-anchor="middle">CMH</text>
    </g>
    <g transform="translate(0 88)">
      <rect x="-100" y="0" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
      <text x="-50" y="21" fill="#FFFFFF" text-anchor="middle">ESHRE</text>
    </g>
    <g transform="translate(0 132)">
      <rect x="-100" y="0" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
      <text x="-50" y="21" fill="#FFFFFF" text-anchor="middle">BCPS</text>
    </g>
    <g transform="translate(0 176)">
      <rect x="-100" y="0" width="100" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.18"/>
      <text x="-50" y="21" fill="#FFFFFF" text-anchor="middle">OGSB</text>
    </g>
  </g>
</svg>
